<script>

function setupPreview(inputId, previewId) {
    const input = document.getElementById(inputId);
    const previewContainer = document.getElementById(previewId);

    if (!input || !previewContainer) return; 

    input.addEventListener("change", function(e) {
        const file = e.target.files[0];
        if (!file) return;

        previewContainer.innerHTML = "";
        const reader = new FileReader();
        reader.onload = (event) => {
            const img = document.createElement("img");
            img.src = event.target.result;
            img.style.width = "150px";
            img.style.height = "100px";
            img.style.objectFit = "cover";
            img.style.border = "2px solid #ccc";
            img.style.borderRadius = "4px";
            img.style.marginTop = "10px";
            
            const fileName = document.createElement("p");
            fileName.textContent = file.name;
            fileName.style.fontSize = "10px";
            fileName.style.color = "#333";

            previewContainer.appendChild(img);
            previewContainer.appendChild(fileName);
        };
        reader.readAsDataURL(file);
    });
}


for(let i = 1; i <= 10; i++) {
    setupPreview(`img${i}`, `preview${i}`);
}

document.getElementById("exportWord").addEventListener("click", async () => {
    const createData = JSON.parse(localStorage.getItem("chainsawFormData")) || {};
    const inspectionData = JSON.parse(localStorage.getItem("inspectionFormData")) || {};

    const loggedInUser = JSON.parse(localStorage.getItem("user")) || {};

    const approvedByUser = {
        fullname: createData.approvedBy || "Unknown",
        position: createData.position || "Position not set"
    };

    const data = {
        regNo: createData.regNo || "",
        ownerName: createData.ownerName || "",
        address: createData.address || "",
        brand: createData.brand || "",
        model: createData.model || "",
        datePurchased: createData.dateAcquired || "",
        serialNo: createData.serialNo || "",
        horsepower: createData.horsepower || "",
        guidebar: createData.guidebar || "",
        others: createData.others || "",
        dateRegistered: createData.issuedOn || "",
        expiryDate: createData.expiryDate || "",
        
        purpose: inspectionData["purpose"] || createData.useCase || "",
        remarks: inspectionData["remarks"] || createData.others || "",
        receiptNo: inspectionData["receiptNo"] || "",
        orNumber: inspectionData["orNumber"] || "",
        performanceEval: inspectionData["performanceEval"] || "",
        recommendation: inspectionData["recommendation"] || "",
        dealer: inspectionData["dealer"] || "N/A",
        templateKey: "addfiles",
            
        evaluatedByName: (inspectionData["evaluatedByName"] || loggedInUser.fullname || "Unknown User").toUpperCase(),
        evaluatedByPosition: inspectionData["evaluatedByPosition"] || loggedInUser.position || "EMS I/ Chief, Utilization Unit",
        approvedByName: (approvedByUser.fullname || "Unknown").toUpperCase(),
        approvedByPosition: approvedByUser.position || "CENR Officer",
        recommendingApprovalName: String(inspectionData["approvedByName"] || "").trim().toUpperCase(),
        recommendingApprovalPosition: String(inspectionData["approvedByPosition"] || "").trim()

    };

    const formData = new FormData();

    
    const imageFields = ['img1', 'img2', 'img3', 'img4', 'img5', 'img6', 'img7', 'img8', 'img9', 'img10'];
    
    imageFields.forEach(id => {
        const fileInput = document.getElementById(id);
        if (fileInput && fileInput.files && fileInput.files[0]) {
            formData.append(id, fileInput.files[0]);
        }
    });

    for (const key in data) {
        formData.append(key, data[key]);
    }

    try {
        const res = await fetch("/generate-docx", {
            method: "POST",
            body: formData
        });

        if (!res.ok) throw new Error("DOCX generation failed");

        const blob = await res.blob();
        const url = window.URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = `Chainsaw_Reg_${data.ownerName.replace(/\s+/g, '_')}.docx`;
        link.click();
        
        alert("âœ… DOCX GENERATED SUCCESSFULLY!");
    } catch (err) {
        alert("âŒ Error: " + err.message);
    }
});

document.querySelector(".print-btn").addEventListener("click", async () => {
    const btn = document.querySelector(".print-btn");
    const originalText = btn.textContent;
    
    
    btn.textContent = "Generating PDF...";
    btn.disabled = true;

    const createData = JSON.parse(localStorage.getItem("chainsawFormData")) || {};
    const inspectionData = JSON.parse(localStorage.getItem("inspectionFormData")) || {};
    const formData = new FormData();

    
    const data = {
        ...createData,
        ...inspectionData,
        templateKey: "addfiles",
        recommendingApprovalName: String(inspectionData["approvedByName"] || "").trim().toUpperCase(),
        recommendingApprovalPosition: String(inspectionData["approvedByPosition"] || "").trim()
    };
    for (const key in data) { formData.append(key, data[key]); }

    
    for (let i = 1; i <= 10; i++) {
        const fileInput = document.getElementById(`img${i}`);
        if (fileInput && fileInput.files[0]) {
            formData.append(`img${i}`, fileInput.files[0]);
        }
    }

    try {
        const res = await fetch("/generate-pdf", {
            method: "POST",
            body: formData
        });

        if (!res.ok) throw new Error("Could not generate PDF");

        const blob = await res.blob();
        const url = window.URL.createObjectURL(blob);
        
        
        window.open(url, '_blank');
        
        
        btn.textContent = originalText;
        btn.disabled = false;

    } catch (err) {
        alert("âŒ Error generating printable PDF: " + err.message);
        btn.textContent = originalText;
        btn.disabled = false;
    }
});

const socket = io();
const sessionId = "sess-" + Date.now();
let selectedSlot = 1;
const qrModalOverlay = document.getElementById("qrModalOverlay");
const qrCanvasWrap = document.getElementById("qrCanvasWrap");
const qrModalSubtext = document.getElementById("qrModalSubtext");
const qrCloseBtn = document.getElementById("qrCloseBtn");

socket.emit("join-session", sessionId);


const uploadBoxes = document.querySelectorAll(".upload-box");
uploadBoxes.forEach((box, index) => {
    const slotNumber = Number(box.dataset.slot || (index + 1));

    box.addEventListener("click", () => {
        selectedSlot = slotNumber;
    });

    box.addEventListener("contextmenu", (e) => {
        e.preventDefault();
        selectedSlot = slotNumber;
        openPhoneForSlot(slotNumber);
    });
});

document.getElementById("usePhoneBtn").addEventListener("click", () => {
    openPhoneForSlot(selectedSlot);
});

qrCloseBtn.addEventListener("click", () => {
    qrModalOverlay.style.display = "none";
    qrModalOverlay.setAttribute("aria-hidden", "true");
});

qrModalOverlay.addEventListener("click", (e) => {
    if (e.target === qrModalOverlay) {
        qrModalOverlay.style.display = "none";
        qrModalOverlay.setAttribute("aria-hidden", "true");
    }
});

document.addEventListener("keydown", (e) => {
    if (e.key === "Escape" && qrModalOverlay.style.display === "flex") {
        qrModalOverlay.style.display = "none";
        qrModalOverlay.setAttribute("aria-hidden", "true");
    }
});

function getMobileOrigin() {
    const protocol = window.location.protocol || "http:";
    const port = window.location.port ? `:${window.location.port}` : "";
    const host = window.location.hostname;

    if (host && host !== "localhost" && host !== "127.0.0.1") {
        return `${protocol}//${host}${port}`;
    }

    const savedLanHost = localStorage.getItem("mobileLanHost");
    if (savedLanHost) {
        return `${protocol}//${savedLanHost}${port}`;
    }

    const enteredLanHost = window.prompt(
        "Enter your PC LAN IP (example: 192.168.1.61) so phone opens faster:",
        "192.168.1.61"
    );
    if (enteredLanHost) {
        const cleanHost = enteredLanHost.trim();
        if (cleanHost) {
            localStorage.setItem("mobileLanHost", cleanHost);
            return `${protocol}//${cleanHost}${port}`;
        }
    }

    return `${protocol}//localhost${port}`;
}

function openPhoneForSlot(slotNumber) {
    const origin = getMobileOrigin();
    const url = `${origin}/mobile1.html?session=${sessionId}&slot=${slotNumber}`;

    QRCode.toCanvas(url, (err, canvas) => {
        if (err) return;
        qrCanvasWrap.innerHTML = "";
        qrCanvasWrap.appendChild(canvas);
        qrModalSubtext.textContent = `Slot ${slotNumber}: Scan this code on your phone.`;
        qrModalOverlay.style.display = "flex";
        qrModalOverlay.setAttribute("aria-hidden", "false");
    });
}


socket.on("image-uploaded", (data) => {
    const slot = Number(data.slot);
    if (!Number.isFinite(slot) || slot < 1 || slot > 10) return;

    
    fetch(data.imageUrl)
        .then(res => {
            if (!res.ok) throw new Error("Failed to fetch uploaded image");
            return res.blob();
        })
        .then(blob => {
            const extension = (blob.type && blob.type.split("/")[1]) ? blob.type.split("/")[1] : "jpg";
            const file = new File([blob], `mobile-slot-${slot}.${extension}`, { type: blob.type || "image/jpeg" });
            const dataTransfer = new DataTransfer();
            dataTransfer.items.add(file);

            const input = document.getElementById(`img${slot}`);
            if (!input) return;

            input.files = dataTransfer.files;
            input.dispatchEvent(new Event("change", { bubbles: true }));
        })
        .catch(() => {
            const preview = document.getElementById(`preview${slot}`);
            if (!preview) return;
            preview.innerHTML = "";
            const img = document.createElement("img");
            img.src = data.imageUrl;
            img.style.width = "150px";
            img.style.height = "100px";
            img.style.objectFit = "cover";
            preview.appendChild(img);
        });
});

</script>
