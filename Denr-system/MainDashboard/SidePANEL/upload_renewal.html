<script>

const uploadFlowKey = window.location.pathname.includes("upload_renewal") ? "renewal" : "new";

function setupPreview(inputId, previewId) {
    const input = document.getElementById(inputId);
    const previewContainer = document.getElementById(previewId);

    if (!input || !previewContainer) return; 

    input.addEventListener("change", function(e) {
        const file = e.target.files[0];
        if (!file) return;

        if (window.denrImageCache) {
            // Persist the selected image so Back/Next navigation keeps it.
            window.denrImageCache.set(`${uploadFlowKey}:${inputId}`, file);
        }

        previewContainer.innerHTML = "";
        const reader = new FileReader();
        reader.onload = (event) => {
            const img = document.createElement("img");
            img.src = event.target.result;
            img.style.width = "150px";
            img.style.height = "100px";
            img.style.objectFit = "cover";
            img.style.border = "2px solid #ccc";
            img.style.borderRadius = "4px";
            img.style.marginTop = "10px";
            
            const fileName = document.createElement("p");
            fileName.textContent = file.name;
            fileName.style.fontSize = "10px";
            fileName.style.color = "#333";

            previewContainer.appendChild(img);
            previewContainer.appendChild(fileName);
        };
        reader.readAsDataURL(file);
    });
}

async function restoreCachedPreview(inputId, previewId) {
    if (!window.denrImageCache) return;
    const previewContainer = document.getElementById(previewId);
    if (!previewContainer || previewContainer.childNodes.length) return;

    const cached = await window.denrImageCache.get(`${uploadFlowKey}:${inputId}`);
    if (!cached || !cached.blob) return;

    const objectUrl = URL.createObjectURL(cached.blob);
    previewContainer.innerHTML = "";

    const img = document.createElement("img");
    img.src = objectUrl;
    img.onload = () => URL.revokeObjectURL(objectUrl);
    img.style.width = "150px";
    img.style.height = "100px";
    img.style.objectFit = "cover";
    img.style.border = "2px solid #ccc";
    img.style.borderRadius = "4px";
    img.style.marginTop = "10px";

    const fileName = document.createElement("p");
    fileName.textContent = cached.filename || "cached-image";
    fileName.style.fontSize = "10px";
    fileName.style.color = "#333";

    previewContainer.appendChild(img);
    previewContainer.appendChild(fileName);
}

const landscapePreferredImageIds = new Set(["img1", "img2", "img3"]);
const portraitPreferredImageIds = new Set(["img4", "img6", "img7", "img8", "img9", "img10"]);

function fileToImage(file) {
    return new Promise((resolve, reject) => {
        const img = new Image();
        const objectUrl = URL.createObjectURL(file);
        img.onload = () => {
            URL.revokeObjectURL(objectUrl);
            resolve(img);
        };
        img.onerror = () => {
            URL.revokeObjectURL(objectUrl);
            reject(new Error("Could not read selected image."));
        };
        img.src = objectUrl;
    });
}

async function getExifOrientation(file) {
    if (!file || !/jpe?g$/i.test(file.type)) return 1;
    try {
        const buffer = await file.arrayBuffer();
        const view = new DataView(buffer);
        if (view.getUint16(0, false) !== 0xFFD8) return 1;

        let offset = 2;
        while (offset < view.byteLength) {
            const marker = view.getUint16(offset, false);
            offset += 2;
            if (marker === 0xFFE1) {
                const exifLength = view.getUint16(offset, false);
                offset += 2;
                if (view.getUint32(offset, false) !== 0x45786966) return 1; // "Exif"
                offset += 6;

                const little = view.getUint16(offset, false) === 0x4949;
                const firstIFDOffset = view.getUint32(offset + 4, little);
                let dirOffset = offset + firstIFDOffset;
                const entries = view.getUint16(dirOffset, little);
                dirOffset += 2;

                for (let i = 0; i < entries; i++) {
                    const entryOffset = dirOffset + i * 12;
                    const tag = view.getUint16(entryOffset, little);
                    if (tag === 0x0112) {
                        return view.getUint16(entryOffset + 8, little) || 1;
                    }
                }
                return 1;
            }
            if ((marker & 0xFF00) !== 0xFF00) break;
            offset += view.getUint16(offset, false);
        }
    } catch (_) {
        return 1;
    }
    return 1;
}

function drawWithExifOrientation(ctx, img, orientation, width, height) {
    switch (orientation) {
        case 2: ctx.translate(width, 0); ctx.scale(-1, 1); break;
        case 3: ctx.translate(width, height); ctx.rotate(Math.PI); break;
        case 4: ctx.translate(0, height); ctx.scale(1, -1); break;
        case 5: ctx.rotate(0.5 * Math.PI); ctx.scale(1, -1); break;
        case 6: ctx.rotate(0.5 * Math.PI); ctx.translate(0, -height); break;
        case 7: ctx.rotate(0.5 * Math.PI); ctx.translate(width, -height); ctx.scale(-1, 1); break;
        case 8: ctx.rotate(-0.5 * Math.PI); ctx.translate(-width, 0); break;
        default: break;
    }
    ctx.drawImage(img, 0, 0, width, height);
}

function rotateCanvas90(canvas) {
    const rotated = document.createElement("canvas");
    rotated.width = canvas.height;
    rotated.height = canvas.width;
    const rctx = rotated.getContext("2d");
    rctx.translate(rotated.width / 2, rotated.height / 2);
    rctx.rotate(-Math.PI / 2);
    rctx.drawImage(canvas, -canvas.width / 2, -canvas.height / 2);
    return rotated;
}

async function prepareImageForDocument(imageId, file) {
    if (!file || !file.type || !file.type.startsWith("image/")) return file;
    if (!portraitPreferredImageIds.has(imageId) && !landscapePreferredImageIds.has(imageId)) return file;

    const exifOrientation = await getExifOrientation(file);
    const image = await fileToImage(file);
    const swapsDimensions = [5, 6, 7, 8].includes(exifOrientation);

    const normalizedCanvas = document.createElement("canvas");
    normalizedCanvas.width = swapsDimensions ? image.height : image.width;
    normalizedCanvas.height = swapsDimensions ? image.width : image.height;
    const nctx = normalizedCanvas.getContext("2d");
    drawWithExifOrientation(nctx, image, exifOrientation, image.width, image.height);

    let outputCanvas = normalizedCanvas;
    const isLandscape = outputCanvas.width >= outputCanvas.height;
    const shouldRotateToPortrait = portraitPreferredImageIds.has(imageId) && isLandscape;
    const shouldRotateToLandscape = landscapePreferredImageIds.has(imageId) && !isLandscape;
    if (shouldRotateToPortrait || shouldRotateToLandscape) {
        outputCanvas = rotateCanvas90(outputCanvas);
    } else if (exifOrientation === 1) {
        return file;
    }

    const blob = await new Promise((resolve) => {
        outputCanvas.toBlob(resolve, "image/jpeg", 0.92);
    });
    if (!blob) return file;

    const baseName = file.name.replace(/\.[^.]+$/, "");
    return new File([blob], `${baseName}_portrait.jpg`, { type: "image/jpeg" });
}

const renewalFormData = JSON.parse(localStorage.getItem("chainsawFormData")) || {};
const requiresDeedOfSale = Boolean(renewalFormData.ownerChanged);
const activeImageIds = requiresDeedOfSale
    ? ["img1", "img2", "img3", "img4", "img5", "img6", "img7", "img8", "img9", "img10"]
    : ["img1", "img2", "img3", "img4", "img6", "img7", "img8", "img9", "img10"];

function applyRenewalAttachmentLayout() {
    const deedBox = document.getElementById("deedOfSaleBox");
    if (deedBox) deedBox.style.display = requiresDeedOfSale ? "" : "none";

    const labelMap = requiresDeedOfSale
        ? {
            labelImg6: "6. Brgy Certification",
            labelImg7: "7. Affidavit of Legal Use",
            labelImg8: "8. Receipt of Chainsaw",
            labelImg9: "9. Permit to Sell",
            labelImg10: "10. Receipt of Payment"
        }
        : {
            labelImg6: "5. Brgy Certification",
            labelImg7: "6. Affidavit of Legal Use",
            labelImg8: "7. Receipt of Chainsaw",
            labelImg9: "8. Permit to Sell",
            labelImg10: "9. Receipt of Payment"
        };

    Object.keys(labelMap).forEach((id) => {
        const label = document.getElementById(id);
        if (label) label.textContent = labelMap[id];
    });
}

applyRenewalAttachmentLayout();


activeImageIds.forEach((imgId) => {
    setupPreview(imgId, imgId.replace("img", "preview"));
});

// Restore cached previews after wiring handlers.
(async () => {
    if (!window.denrImageCache) return;
    for (const imgId of activeImageIds) {
        await restoreCachedPreview(imgId, imgId.replace("img", "preview"));
    }
})();


document.querySelector(".print-btn").addEventListener("click", async () => {
    const btn = document.querySelector(".print-btn");
    const originalText = btn.textContent;
    if (!startProgress("Generating PDF preview...")) return;
    
    
    btn.textContent = "Generating PDF preview...";
    btn.disabled = true;

    const createData = JSON.parse(localStorage.getItem("chainsawFormData")) || {};
    const inspectionData = JSON.parse(localStorage.getItem("inspectionFormData")) || {};
    const formData = new FormData();

    
    const data = { ...createData, ...inspectionData };
    for (const key in data) { formData.append(key, data[key]); }

    
    for (const imgId of activeImageIds) {
        const fileInput = document.getElementById(imgId);
        if (fileInput && fileInput.files[0]) {
            const preparedFile = await prepareImageForDocument(imgId, fileInput.files[0]);
            formData.append(imgId, preparedFile);
        }
    }

    try {
        const res = await fetch("/generate-pdf", {
            method: "POST",
            body: formData
        });

        if (!res.ok) throw new Error("Could not generate PDF");

        const blob = await res.blob();
        const url = window.URL.createObjectURL(blob);
        
        
        openPdfModal(url);
        finishProgress(true, "PDF preview generated successfully.");
        
        
        btn.textContent = originalText;
        btn.disabled = false;

    } catch (err) {
        finishProgress(false, "Failed to generate PDF preview.");
        alert("âŒ Error generating PDF preview: " + err.message);
        btn.textContent = originalText;
        btn.disabled = false;
    }
});

const socket = io();
const sessionId = "sess-" + Date.now();
let selectedSlot = 1;
let serverBaseUrl = window.location.origin;

async function loadServerBaseUrl() {
    try {
        const res = await fetch("/server-base-url");
        if (!res.ok) return;
        const data = await res.json();
        if (data && data.baseUrl) serverBaseUrl = data.baseUrl;
    } catch (_) {}
}

loadServerBaseUrl();
const qrModalOverlay = document.getElementById("qrModalOverlay");
const qrCanvasWrap = document.getElementById("qrCanvasWrap");
const qrModalSubtext = document.getElementById("qrModalSubtext");
const qrCloseBtn = document.getElementById("qrCloseBtn");
const progressOverlay = document.getElementById("progressOverlay");
const progressFill = document.getElementById("progressFill");
const progressTitle = document.getElementById("progressTitle");
const progressText = document.getElementById("progressText");
const pdfModalOverlay = document.getElementById("pdfModalOverlay");
const pdfViewerFrame = document.getElementById("pdfViewerFrame");
const pdfCloseBtn = document.getElementById("pdfCloseBtn");
let progressTimer = null;
let progressValue = 0;
let isProcessing = false;
let currentPdfUrl = null;

socket.emit("join-session", sessionId);

function startProgress(title) {
    if (isProcessing) return false;
    isProcessing = true;
    document.body.classList.add("processing-lock");
    document.body.setAttribute("aria-busy", "true");
    progressTitle.textContent = title || "Processing...";
    progressText.textContent = "Please wait while the file is being prepared.";
    progressOverlay.style.display = "flex";
    progressOverlay.setAttribute("aria-hidden", "false");
    progressValue = 8;
    progressFill.style.width = progressValue + "%";

    if (progressTimer) clearInterval(progressTimer);
    progressTimer = setInterval(() => {
        if (progressValue < 92) {
            progressValue += Math.random() * 6;
            if (progressValue > 92) progressValue = 92;
            progressFill.style.width = progressValue + "%";
        }
    }, 220);
    return true;
}

function finishProgress(success, message) {
    if (progressTimer) {
        clearInterval(progressTimer);
        progressTimer = null;
    }
    progressFill.style.width = "100%";
    progressText.textContent = message || (success ? "Completed." : "Failed.");

    setTimeout(() => {
        progressOverlay.style.display = "none";
        progressOverlay.setAttribute("aria-hidden", "true");
        progressFill.style.width = "0%";
        isProcessing = false;
        document.body.classList.remove("processing-lock");
        document.body.removeAttribute("aria-busy");
    }, 500);
}

function openPdfModal(pdfUrl) {
    if (currentPdfUrl) {
        try { URL.revokeObjectURL(currentPdfUrl); } catch (_) {}
    }
    currentPdfUrl = pdfUrl;
    pdfViewerFrame.src = `${pdfUrl}#toolbar=0&navpanes=0&scrollbar=0`;
    pdfModalOverlay.style.display = "flex";
    pdfModalOverlay.setAttribute("aria-hidden", "false");
}

function closePdfModal() {
    pdfModalOverlay.style.display = "none";
    pdfModalOverlay.setAttribute("aria-hidden", "true");
    pdfViewerFrame.src = "";
    if (currentPdfUrl) {
        try { URL.revokeObjectURL(currentPdfUrl); } catch (_) {}
        currentPdfUrl = null;
    }
}

function blockWhileProcessing(e) {
    if (!isProcessing) return;
    const insideProgress = e.target && e.target.closest && e.target.closest("#progressOverlay");
    if (!insideProgress) {
        e.preventDefault();
        e.stopPropagation();
        e.stopImmediatePropagation();
    }
}

document.addEventListener("click", blockWhileProcessing, true);
document.addEventListener("contextmenu", blockWhileProcessing, true);
document.addEventListener("submit", blockWhileProcessing, true);
document.addEventListener("keydown", (e) => {
    if (!isProcessing) return;
    const allowedKeys = ["F5"];
    if (!allowedKeys.includes(e.key)) {
        e.preventDefault();
        e.stopPropagation();
    }
}, true);

pdfCloseBtn.addEventListener("click", closePdfModal);

pdfModalOverlay.addEventListener("click", (e) => {
    if (e.target === pdfModalOverlay) closePdfModal();
});


document.querySelectorAll(".upload-box").forEach((box, index) => {
    const slotNumber = Number(box.dataset.slot || (index + 1));

    box.addEventListener("click", () => {
        selectedSlot = slotNumber;
    });

    box.addEventListener("contextmenu", (e) => {
        e.preventDefault();
        selectedSlot = slotNumber;
        openPhoneForSlot(slotNumber);
    });
});

document.getElementById("usePhoneBtn").addEventListener("click", () => {
    openPhoneForSlot(selectedSlot);
});

qrCloseBtn.addEventListener("click", () => {
    qrModalOverlay.style.display = "none";
    qrModalOverlay.setAttribute("aria-hidden", "true");
});

qrModalOverlay.addEventListener("click", (e) => {
    if (e.target === qrModalOverlay) {
        qrModalOverlay.style.display = "none";
        qrModalOverlay.setAttribute("aria-hidden", "true");
    }
});

document.addEventListener("keydown", (e) => {
    if (e.key === "Escape" && qrModalOverlay.style.display === "flex") {
        qrModalOverlay.style.display = "none";
        qrModalOverlay.setAttribute("aria-hidden", "true");
    }
    if (e.key === "Escape" && pdfModalOverlay.style.display === "flex") {
        closePdfModal();
    }
});

function openPhoneForSlot(slotNumber) {
    const url = `${serverBaseUrl}/mobile.html?session=${sessionId}&slot=${slotNumber}`;

    QRCode.toCanvas(url, (err, canvas) => {
        if (err) return;
        qrCanvasWrap.innerHTML = "";
        qrCanvasWrap.appendChild(canvas);
        qrModalSubtext.textContent = `Slot ${slotNumber}: Scan this code on your phone.`;
        qrModalOverlay.style.display = "flex";
        qrModalOverlay.setAttribute("aria-hidden", "false");
    });
}


socket.on("image-uploaded", (data) => {
    const preview = document.getElementById(`preview${data.slot}`);
    if (!preview) return;
    preview.innerHTML = "";

    const img = document.createElement("img");
    img.src = data.imageUrl;
    img.style.width = "150px";
    img.style.height = "100px";
    img.style.objectFit = "cover";

    preview.appendChild(img);

    
    fetch(data.imageUrl)
        .then(res => res.blob())
        .then(blob => {
            const file = new File([blob], "mobile.jpg", { type: blob.type });
            const dataTransfer = new DataTransfer();
            dataTransfer.items.add(file);
            const input = document.getElementById(`img${data.slot}`);
            if (input) input.files = dataTransfer.files;
        });
});

</script>
