<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/logo.png">
    <title>E-CHAINSAW RMS - Approval</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/evalution.css">
    <link rel="stylesheet" href="/css/dashboard.css">

</head>
<body class="approval-page">
  <div class="sidebar">
    <div class="sidebar-header">
        <div class="sidebar-logo">
            <img src="/assets/logo.png" alt="Logo" style="width: 100px; height: auto;">
        </div>
        <h2>CHAINSAW REGISTRATION SYSTEM <br> <span>ADMIN</span></h2>
        
    </div>
    <ul>
      <li><a href="/MainDashboard/AdminDashboard.html">Dashboard</a></li>
      <li><a href="/MainDashboard/SidePANEL/Forprinting.html">For Printing</a></li>
      <li><a href="/MainDashboard/SidePANEL/approval.html" class="active">Approval</a></li>
      <li><a href="/MainDashboard/SidePANEL/registered.html">Registered</a></li>
      <li><a href="/Auth/adduser.html">Add Employee</a></li>
      <li><a href="/Auth/Login.html" id="logoutBtn">Log out</a></li>
      <li class="bottom-link"><a class="bottom-nav" href="/liquid-glass/aboutDev.html">About Developers</a></li>
    </ul>
  </div>

    <main class="main">

        <div class="content-wrapper">
            <div class="page-header">
                <h1>Approved for Issuance</h1>
            </div>

            <div class="filters">
                <label for="dateFilter">Filter by Date:</label>
                <select id="dateFilter" class="filter-select">
                    <option value="all">All Time</option>
                    <option value="week">Past 1 Week</option>
                    <option value="month">Past 1 Month</option>
                    <option value="year">Past 1 Year</option>
                </select>
                <input id="searchInput" class="filter-search" type="text" placeholder="Search reg no, owner, serial">
            </div>

            <div class="table-container">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Registration No.</th>
                            <th>Name of Owner</th>
                            <th>Serial No.</th>
                            <th>Status</th>
                            <th>Release</th>
                            <th>PDF</th>
                        </tr>
                    </thead>
                    <tbody id="approvalRows"></tbody>
                </table>
            </div>
        </div>
    </main>

    <div id="pdfOverlay" class="popup-overlay" aria-hidden="true">
        <div class="popup-dialog pdf-dialog" role="dialog" aria-modal="true" aria-labelledby="pdfTitle">
            <h3 id="pdfTitle" class="popup-title">PDF Preview</h3>
            <iframe id="pdfFrame" class="pdf-frame"></iframe>
            <div class="popup-actions pdf-actions">
                <button type="button" id="pdfPrintBtn" class="popup-btn">Print</button>
                <button type="button" id="pdfCloseBtn" class="popup-btn">Close</button>
            </div>
        </div>
    </div>

    <div id="progressOverlay" class="progress-overlay" aria-hidden="true">
        <div class="progress-modal" role="dialog" aria-modal="true" aria-labelledby="progressTitle">
            <h3 id="progressTitle" class="progress-title">Processing...</h3>
            <div class="progress-track">
                <div id="progressFill" class="progress-fill"></div>
            </div>
            <p id="progressText" class="progress-text">Please wait.</p>
        </div>
    </div>

    <script>
        lucide.createIcons();

        const rowsEl = document.getElementById("approvalRows");
        const dateFilter = document.getElementById("dateFilter");
        const searchInput = document.getElementById("searchInput");
        const pdfOverlay = document.getElementById("pdfOverlay");
        const pdfFrame = document.getElementById("pdfFrame");
        const pdfPrintBtn = document.getElementById("pdfPrintBtn");
        const pdfCloseBtn = document.getElementById("pdfCloseBtn");
        const progressOverlay = document.getElementById("progressOverlay");
        const progressFill = document.getElementById("progressFill");
        const progressTitle = document.getElementById("progressTitle");
        const progressText = document.getElementById("progressText");
        const nextReturnedBtn = document.getElementById("nextReturnedBtn");
        let allItems = [];
        let activeRange = "all";
        let pdfUrl = null;
        let progressTimer = null;
        let progressValue = 0;
        let isProcessing = false;
        let selectedRegistrationId = null;
        let selectedRowEl = null;
        let searchQuery = "";

        const startProgress = (title) => {
            if (isProcessing) return false;
            isProcessing = true;
            document.body.classList.add("processing-lock");
            document.body.setAttribute("aria-busy", "true");
            progressTitle.textContent = title || "Processing...";
            progressText.textContent = "Please wait while the request is being processed.";
            progressOverlay.style.display = "flex";
            progressOverlay.setAttribute("aria-hidden", "false");
            progressValue = 8;
            progressFill.style.width = `${progressValue}%`;

            if (progressTimer) clearInterval(progressTimer);
            progressTimer = setInterval(() => {
                if (progressValue < 92) {
                    progressValue += Math.random() * 6;
                    if (progressValue > 92) progressValue = 92;
                    progressFill.style.width = `${progressValue}%`;
                }
            }, 220);
            return true;
        };

        const finishProgress = (success, message) => {
            if (progressTimer) {
                clearInterval(progressTimer);
                progressTimer = null;
            }
            progressFill.style.width = "100%";
            progressText.textContent = message || (success ? "Completed." : "Failed.");

            setTimeout(() => {
                progressOverlay.style.display = "none";
                progressOverlay.setAttribute("aria-hidden", "true");
                progressFill.style.width = "0%";
                isProcessing = false;
                document.body.classList.remove("processing-lock");
                document.body.removeAttribute("aria-busy");
            }, 500);
        };

        const blockWhileProcessing = (e) => {
            if (!isProcessing) return;
            const insideProgress = e.target && e.target.closest && e.target.closest("#progressOverlay");
            if (!insideProgress) {
                e.preventDefault();
                e.stopPropagation();
                e.stopImmediatePropagation();
            }
        };

        const renderRows = (items) => {
            if (!rowsEl) return;
            rowsEl.innerHTML = "";

            // Filter only approved items that are still pending release
            const pendingItems = items.filter(
                item => item.approvalStatus === "Approved" && item.releasedStatus !== "Released"
            );

            const q = searchQuery.trim().toLowerCase();
            const filteredItems = q
                ? pendingItems.filter((item) =>
                    String(item.regNo || "").toLowerCase().includes(q) ||
                    String(item.ownerName || "").toLowerCase().includes(q) ||
                    String(item.serialNo || "").toLowerCase().includes(q)
                )
                : pendingItems;

            if (!filteredItems.length) {
                rowsEl.innerHTML = `<tr><td colspan="6" style="text-align:center;">No pending records found.</td></tr>`;
                return;
            }

            filteredItems.forEach((item) => {
                const tr = document.createElement("tr");
                tr.classList.add("selectable-row");
                tr.dataset.id = String(item.id);
                tr.innerHTML = `
                    <td>${item.regNo || ""}</td>
                    <td>${item.ownerName || ""}</td>
                    <td>${item.serialNo || ""}</td>
                    <td><span class="badge status-approved">Pending</span></td>
                    <td>
                        <button type="button" class="btn btn-view release-btn" data-id="${item.id}">Release</button>
                    </td>
                    <td>
                        <button type="button" class="btn btn-view pdf-btn" data-id="${item.id}">Preview PDF</button>
                    </td>
                `;
                rowsEl.appendChild(tr);

                tr.addEventListener("click", (e) => {
                    // Don't treat button clicks as row selection.
                    if (e.target && e.target.closest && e.target.closest("button")) return;
                    selectedRegistrationId = Number(item.id);
                    if (selectedRowEl) selectedRowEl.classList.remove("is-selected");
                    selectedRowEl = tr;
                    tr.classList.add("is-selected");
                });
            });

            // Attach release button handlers
            rowsEl.querySelectorAll(".release-btn").forEach((btn) => {
                btn.addEventListener("click", async () => {
                    if (isProcessing) return;
                    const id = btn.getAttribute("data-id");
                    const ok = confirm("Are you sure you want to mark this as Released?");
                    if (!ok) return;
                    if (!startProgress("Updating release status...")) return;

                    const payload = {
                        releasedStatus: "Released",
                        releasedAt: new Date().toISOString().slice(0, 19).replace("T", " ")
                    };

                    try {
                        const res = await fetch(`/registrations/${id}/release`, {
                            method: "PUT",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify(payload)
                        });
                        const data = await res.json();
                        if (!res.ok) throw new Error(data.message || "Update failed");

                        finishProgress(true, "Release status updated.");
                        loadData();
                    } catch (err) {
                        console.error("Release update error:", err);
                        finishProgress(false, "Failed to update release status.");
                        alert("Failed to update release status.");
                    }
                });
            });

            rowsEl.querySelectorAll(".pdf-btn").forEach((btn) => {
                btn.addEventListener("click", async () => {
                    const id = btn.getAttribute("data-id");
                    const record = filteredItems.find((i) => String(i.id) === String(id));
                    if (!record) return;
                    await previewPdf(record);
                });
            });

        };

        if (nextReturnedBtn) {
            nextReturnedBtn.addEventListener("click", () => {
                if (!selectedRegistrationId) {
                    alert("Select a record first.");
                    return;
                }
                window.location.href = `/MainDashboard/SidePANEL/Returned/upload_returned.html?registrationId=${encodeURIComponent(String(selectedRegistrationId))}`;
            });
        }

        const filterByRange = (items) => {
            if (activeRange === "all") return items;
            const now = new Date();
            let cutoff = new Date(now);

            if (activeRange === "week") cutoff.setDate(now.getDate() - 7);
            if (activeRange === "month") cutoff.setMonth(now.getMonth() - 1);
            if (activeRange === "year") cutoff.setFullYear(now.getFullYear() - 1);

            return items.filter((item) => {
                const dateVal = item.dateRegistered || item.tatStart;
                if (!dateVal) return false;
                return new Date(dateVal) >= cutoff;
            });
        };

        if (dateFilter) {
            dateFilter.addEventListener("change", () => {
                activeRange = dateFilter.value || "all";
                renderRows(filterByRange(allItems));
            });
        }
        if (searchInput) {
            searchInput.addEventListener("input", () => {
                searchQuery = searchInput.value || "";
                renderRows(filterByRange(allItems));
            });
        }

        const loadData = async () => {
            try {
                
                const res = await fetch("/registrations/evaluation");
                const data = await res.json();
                allItems = Array.isArray(data) ? data : [];
                renderRows(filterByRange(allItems));
            } catch (err) {
                console.error("Failed to load approval data:", err);
                renderRows([]);
            }
        };

        const previewPdf = async (record) => {
            if (!startProgress("Generating PDF preview...")) return;
            const formData = new FormData();
            const data = {
                regNo: record.regNo || "",
                ownerName: record.ownerName || "",
                address: record.address || "",
                brand: record.brand || "",
                model: record.model || "",
                datePurchased: record.datePurchased || "",
                serialNo: record.serialNo || "",
                horsepower: record.horsepower || "",
                guidebar: record.guidebar || "",
                others: record.others || "",
                dateRegistered: record.dateRegistered || "",
                expiryDate: record.expiryDate || "",
                purpose: record.purpose || "",
                remarks: record.remarks || "",
                receiptNo: record.receiptNo || "",
                orNumber: record.orNumber || "",
                performanceEval: record.performanceEval || "",
                recommendation: record.recommendation || "",
                dealer: record.dealer || "",
                evaluatedByName: record.evaluatedByName || "",
                evaluatedByPosition: record.evaluatedByPosition || "",
                approvedByName: record.approvedByName || "",
                approvedByPosition: record.approvedByPosition || "",
                recommendingApprovalName: record.recommendingApprovalName || "",
                recommendingApprovalPosition: record.recommendingApprovalPosition || ""
            };

            Object.keys(data).forEach((key) => formData.append(key, data[key]));

            const images = Array.isArray(record.images) ? record.images.slice(0, 10) : [];
            for (let i = 0; i < images.length; i++) {
                try {
                    const res = await fetch(images[i]);
                    const blob = await res.blob();
                    formData.append(`img${i + 1}`, blob, `image${i + 1}.jpg`);
                } catch (err) {
                    console.error("Image fetch failed:", err);
                }
            }

            try {
                const res = await fetch("/generate-pdf", { method: "POST", body: formData });
                if (!res.ok) throw new Error("PDF generation failed");

                const blob = await res.blob();
                const url = window.URL.createObjectURL(blob);
                openPdfModal(url);
                finishProgress(true, "PDF generated successfully.");
            } catch (err) {
                console.error("PDF preview error:", err);
                finishProgress(false, "Failed to preview PDF.");
                alert("Failed to preview PDF.");
            }
        };

        const openPdfModal = (url) => {
            if (!pdfOverlay || !pdfFrame) return;
            if (pdfUrl) URL.revokeObjectURL(pdfUrl);
            pdfUrl = url;
            pdfFrame.src = pdfUrl;
            pdfOverlay.classList.add("show");
            pdfOverlay.setAttribute("aria-hidden", "false");
        };

        const closePdfModal = () => {
            if (!pdfOverlay || !pdfFrame) return;
            pdfOverlay.classList.remove("show");
            pdfOverlay.setAttribute("aria-hidden", "true");
            pdfFrame.src = "";
            if (pdfUrl) {
                URL.revokeObjectURL(pdfUrl);
                pdfUrl = null;
            }
        };

        if (pdfOverlay) {
            pdfOverlay.addEventListener("click", (e) => {
                if (e.target === pdfOverlay) closePdfModal();
            });
        }
        if (pdfPrintBtn) {
            pdfPrintBtn.addEventListener("click", () => {
                if (!pdfFrame || !pdfFrame.src) {
                    alert("No PDF is ready to print yet.");
                    return;
                }
                try {
                    const frameWindow = pdfFrame.contentWindow;
                    if (!frameWindow) throw new Error("Print window unavailable");
                    frameWindow.focus();
                    frameWindow.print();
                } catch (err) {
                    console.error("PDF print error:", err);
                    alert("Unable to open the print dialog for this PDF.");
                }
            });
        }
        if (pdfCloseBtn) pdfCloseBtn.addEventListener("click", closePdfModal);

        document.addEventListener("click", blockWhileProcessing, true);
        document.addEventListener("contextmenu", blockWhileProcessing, true);
        document.addEventListener("submit", blockWhileProcessing, true);
        document.addEventListener("keydown", (e) => {
            if (!isProcessing) return;
            if (e.key !== "F5") {
                e.preventDefault();
                e.stopPropagation();
            }
        }, true);

        loadData();
    </script>
</body>
</html>
